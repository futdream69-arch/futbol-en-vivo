<!DOCTYPE html>
<html>

<head>

<title>Fútbol en Vivo</title>

<style>

body{
margin:0;
color:white;
font-family:Arial;
text-align:center;
background-image:url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

header{
background:#0f3d0f;
padding:20px;
font-size:32px;
border-bottom:3px solid #00ff66;
}

button{
padding:12px 20px;
margin:10px;
font-size:18px;
cursor:pointer;
background:#00aa44;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#00cc55;
}

.seccion{
display:none;
margin-top:20px;
}

.partido{
background:rgba(20,20,20,0.9);
margin:10px auto;
padding:15px;
width:60%;
border-radius:10px;
border-left:5px solid #00ff66;
}

</style>

<script>

function mostrarSeccion(id){

document.getElementById("inicio").style.display="none"
document.getElementById("partidos").style.display="none"

document.getElementById(id).style.display="block"

}

</script>

</head>

<body>

<header>
⚽ Fútbol en Vivo
</header>

<button onclick="mostrarSeccion('inicio')">Inicio</button>
<button onclick="mostrarSeccion('partidos')">Ver Partidos</button>

<div id="inicio" class="seccion" style="display:block">
<h2>Bienvenido</h2>
<p>Selecciona "Ver Partidos" para ver los juegos en vivo.</p>
</div>

<div id="partidos" class="seccion">

<h2>Partidos de Hoy</h2>

<div id="listaPartidos"></div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZx1nK4BAY8n14pdSTqA-liZHv5ML0Fjs",
  authDomain: "futbol-en-vivo-dba8c.firebaseapp.com",
  projectId: "futbol-en-vivo-dba8c",
  storageBucket: "futbol-en-vivo-dba8c.firebasestorage.app",
  messagingSenderId: "336791346623",
  appId: "1:336791346623:web:db37fbf99a30d7518e150a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function cargarPartidos() {

 const querySnapshot = await getDocs(collection(db, "partidos"));
 const contenedor = document.getElementById("listaPartidos");

 querySnapshot.forEach((doc) => {

  const partido = doc.data();

  contenedor.innerHTML += `
  <div class="partido">
  ${partido.hora} - ${partido.liga}
  <br>
  <strong>${partido.equipos}</strong>
  </div>
  `;

 });

}

cargarPartidos();

</script>

</body>
</html>
