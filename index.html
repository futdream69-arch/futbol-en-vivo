<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>⚽ Fútbol en Vivo</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2") no-repeat center center fixed;
background-size:cover;
color:white;
text-align:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

header{
background:#0f3d0f;
padding:20px;
font-size:32px;
border-bottom:3px solid #00ff66;
}

button{
padding:12px 20px;
margin:10px;
font-size:18px;
cursor:pointer;
background:#00aa44;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#00cc55;
}

.seccion{
display:none;
margin-top:20px;
}

.partido{
background:rgba(20,20,20,0.9);
margin:10px auto;
padding:15px;
width:60%;
border-radius:10px;
cursor:pointer;
border-left:5px solid #00ff66;
}

.partido:hover{
background:#222;
}

.canal{
display:block;
background:#111;
margin:10px auto;
padding:10px;
width:220px;
border-radius:8px;
cursor:pointer;
border:1px solid #00ff66;
}

.canal:hover{
background:#00aa44;
}

#playerContainer{
display:none;
margin-top:30px;
}

iframe{
border-radius:10px;
width:800px;
height:450px;
}

#fecha{
margin-top:20px;
font-size:18px;
color:#00ff66;
}

</style>
</head>

<body>

<header>⚽ Fútbol en Vivo</header>

<button onclick="mostrarSeccion('inicio')">Inicio</button>
<button onclick="mostrarSeccion('partidos')">Ver Partidos</button>

<div id="inicio" class="seccion" style="display:block">
<h2>Bienvenido</h2>
<p>Selecciona "Ver Partidos" para ver los juegos en vivo.</p>
</div>

<div id="partidos" class="seccion">
<h2>Partidos de Hoy</h2>
<div id="listaPartidos"></div>
<p id="fecha"></p>
</div>

<div id="canales" class="seccion">
<h2 id="tituloPartido"></h2>
<div id="listaCanales"></div>
</div>

<div id="playerContainer">
<h2>Reproductor</h2>
<iframe id="player" allowfullscreen></iframe>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBbldI5TD_wUfPencYBdspFMtaRm5dZ5eI",
authDomain: "futbol-tv-3faa3.firebaseapp.com",
projectId: "futbol-tv-3faa3",
storageBucket: "futbol-tv-3faa3.firebasestorage.app",
messagingSenderId: "73693804145",
appId: "1:73693804145:web:2817c2adecb7d93812cdd0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const listaPartidos = document.getElementById("listaPartidos");
const listaCanales = document.getElementById("listaCanales");
const reproductor = document.getElementById("playerContainer");
const player = document.getElementById("player");
const fecha = document.getElementById("fecha");

window.mostrarSeccion = function(id){

document.querySelectorAll(".seccion").forEach(s=>s.style.display="none");

document.getElementById(id).style.display="block";

reproductor.style.display="none";
player.src="";

if(id==="partidos"){
mostrarFecha();
cargarPartidos();
}

}

function mostrarFecha(){

const hoy = new Date();

fecha.textContent = hoy.toLocaleDateString("es-ES",{
day:"numeric",
month:"long",
year:"numeric"
});

}

function mostrarCanales(partido){

mostrarSeccion("canales");

document.getElementById("tituloPartido").innerText = partido.equipos;

listaCanales.innerHTML="";

if(!partido.canales || partido.canales.length===0){

listaCanales.innerHTML="<p>No hay canales disponibles</p>";
return;

}

partido.canales.forEach(c=>{

const div = document.createElement("div");

div.className="canal";

div.textContent = c.nombre;

div.onclick = ()=>{

player.src = c.link;

reproductor.style.display="block";

};

listaCanales.appendChild(div);

});

}

async function cargarPartidos(){

listaPartidos.innerHTML="Cargando partidos...";

try{

const snapshot = await getDocs(collection(db,"partidos"));

listaPartidos.innerHTML="";

snapshot.forEach(doc=>{

const p = doc.data();

const div = document.createElement("div");

div.className="partido";

div.innerHTML = `<strong>${p.equipos}</strong><br>${p.liga} - ${p.hora}`;

div.onclick = ()=> mostrarCanales(p);

listaPartidos.appendChild(div);

});

}catch(error){

console.error(error);

listaPartidos.innerHTML="Error cargando partidos";

}

}

</script>

</body>
</html>
